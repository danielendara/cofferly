name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  windows:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package portable zip
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Version "${{ github.ref_name }}"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: AtlasWallet-windows-x64
          path: dist/*.zip
